<!doctype html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./src/styles/fonts.css" />
  <link rel="stylesheet" href="./src/styles/variables.css" />
  <link rel="stylesheet" href="./src/styles/globals.css" />
  <link rel="stylesheet" href="./src/styles/header-style.css" />
  <link rel="stylesheet" href="./src/styles/style.css" />
  <title>Галактический вестник</title>
</head>
<html lang="ru">
  <body>
    <div id="header-container"></div>
    <main id="main">
      <div id="banner-section"></div>
      <div id="news-section"></div>
      <div id="paginator-section"></div>
    </main>
    <footer id="footer"></footer>
    <template id="header-template">
      <header class="header-body">
        <div class="header-logo-container">
          <img class="header-logo" />
        </div>
      </header>
    </template>
    <template id="main-page"></template>
    <template id="news-details-page"></template>
    <template id="news-list-template">
      <h2 class="news_list_title">Новости</h2>
    </template>
    <template id="news-card-item-template">
      <div class="news-card">
        <span class="news-card-date"></span>

        <h3 class="news-card-title"></h3>

        <span class="news-card-announce"></span>

        <button class="news-card-details-button">Подробнее</button>
      </div>
    </template>
    <template id="news-card-banner-template">
      <div class="news-card">
        <img class="news-card-image" />
        <h3 class="news-card-title"></h3>
        <span class="news-card-announce"></span>
      </div>
    </template>
    <template id="news-card-detailed-template">
      <div class="news-card">
        <h3 class="news-card-title"></h3>
        <span class="news-card-date"></span>
        <img class="news-card-image" />
        <span class="news-card-announce"></span>
        <span class="news-card-content"></span>

       <button class="news-card-back-button">Назад</button>
      </div>
    </template>
    <template id="footer-template">
      <div class="footer_body">
        <p class="copyright_info"></p>
      </div>  
    </template>
    <template id="breadcrumbs-template">
  <div class="breadcrumbs">
    <span class="breadcrumbs-previous-page">Главная</span>
    <span> / </span>
    <span class="breadcrumbs-current-news"></span>
  </div>
</template>
<template id="paginator-template"></template>
    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
