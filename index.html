<!doctype html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./src/styles/fonts.css" />
  <link rel="stylesheet" href="./src/styles/variables.css" />
  <link rel="stylesheet" href="./src/styles/globals.css" />
  <link rel="stylesheet" href="./src/styles/header-style.css" />
  <link rel="stylesheet" href="./src/styles/banner-style.css" />
  <link rel="stylesheet" href="./src/styles/list-style.css" />
  <link rel="stylesheet" href="./src/styles/details-style.css" />
  <link rel="stylesheet" href="./src/styles/paginator-style.css" />
  <link rel="stylesheet" href="./src/styles/breadcrumbs-style.css" />
  <link rel="stylesheet" href="./src/styles/footer-style.css" />
  <link rel="stylesheet" href="./src/styles/style.css" />
  <title>Галактический вестник</title>
</head>
<html lang="ru">
   
    <!-- Контейнеры -->
    
    <header id="header-container"></header>
    <main id="main">
      <div id="banner-section"></div>
      <div id="news-section" class="news-section-style"></div>
      <div id="paginator-section" class="paginator-section-style"></div>
    </main>
    <footer id="footer" class="footer-style"></footer>

    <!-- Темплейты -->

    <!-- Т: Хэдер -->
    <template id="header-template">
      <div class="header-body">
        <div class="header-logo-container">
          <img class="header-logo" />
        </div>
      </div>
    </template>

    <!-- Т: Список новостей -->
    <template id="news-list-template">
      <div class="news_list news-list-style">
      <h1 class="news_list_title news-list-title-style">Новости</h1>
      </div>
    </template>

    <!-- Т: Карточка типа Айтем списка -->
    <template id="news-card-item-template">
      <div class="news-card news-card-item-style">
        <span class="news-card-date news-card-item-date-style"></span>
        <h3 class="news-card-title news-card-item-title-style"></h3>
        <span class="news-card-announce"></span>
        <button class="news-card-details-button news-card-details-button-style">
          Подробнее
          <svg
    class="news-card-arrow"
    width="27"
    height="15"
    viewBox="0 0 27 15"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path
      d="M1 6.36395C0.447715 6.36395 0 6.81167 0 7.36395C0 7.91624 0.447715 8.36395 1 8.36395L1 7.36395L1 6.36395ZM26.707 8.07106C27.0975 7.68054 27.0975 7.04737 26.707 6.65685L20.343 0.292887C19.9525 -0.0976379 19.3193 -0.097638 18.9288 0.292886C18.5383 0.683411 18.5383 1.31658 18.9288 1.7071L24.5857 7.36395L18.9288 13.0208C18.5383 13.4113 18.5383 14.0445 18.9288 14.435C19.3193 14.8255 19.9525 14.8255 20.343 14.435L26.707 8.07106ZM1 7.36395L1 8.36395L25.9999 8.36395L25.9999 7.36395L25.9999 6.36395L1 6.36395L1 7.36395Z"
      fill="currentColor"
    />
  </svg>
        </button>
      </div>
    </template>

    <!-- Т: Карточка типа Баннер -->
    <template id="news-card-banner-template">
      <div class="news-card news-card-banner-style">
        <img class="news-card-image news-card-banner-image-style" />
        <div class="news-card-banner-text-style">
          <h1 class="news-card-title news-card-banner-title-style"></h1>
          <span
            class="news-card-announce news-card-banner-announce-style"
          ></span>
        </div>
      </div>
    </template>

    <!-- Т: Карточка типа Детальная -->
    <template id="news-card-detailed-template">  
      <div class="news-card news-card-detailed-style">
        <div class="news-card-title-date-container">
          <h1 class="news-card-title news-card-detailed-title-style"></h1>
          <span class="news-card-date news-card-detailed-date-style"></span>
        </div>
         <div class = "news-card-detailed-content-style">
          <div class="news-card-text-container">
            <h2 class="news-card-announce news-card-detailed-announce-style"></h2>
            <span class="news-card-content"></span>
            <button class="news-card-back-button">
                <svg
    class="news-card-back-arrow"
    width="26"
    height="15"
    viewBox="0 0 26 15"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path
      d="M0.293015 8.07106C-0.0975094 7.68054 -0.0975094 7.04737 0.293014 6.65685L6.65698 0.292887C7.0475 -0.0976379 7.68067 -0.097638 8.07119 0.292886C8.46171 0.683411 8.46171 1.31658 8.07119 1.7071L2.41434 7.36395L8.07119 13.0208C8.46171 13.4113 8.46171 14.0445 8.07119 14.435C7.68067 14.8255 7.0475 14.8255 6.65698 14.435L0.293015 8.07106ZM26 8.36395L1.00012 8.36395L1.00012 6.36395L26 6.36395L26 8.36395Z"
      fill="currentColor"
    />
  </svg>
              Назад к новостям</button>
            </div>
        <div class="news-card-image-container">
          <img class="news-card-image news-card-detailed-image-style" />
        </div>
        </div>
      </div>
    </template>

    <!-- Т: Футер -->
    <template id="footer-template">
      <div class="footer_body footer-body-style">
        <p class="copyright_info copyright-info-style"></p>
      </div>
    </template>

    <!-- Т: Навигация Breadcrumbs -->
    <template id="breadcrumbs-template">
      <div class="breadcrumbs breadcrumbs-style">
        <span class="breadcrumbs-previous-page">Главная</span>
        <span> / </span>
        <span class="breadcrumbs-current-news"></span>
      </div>
    </template>

    <!-- Т: Навигация Paginator -->
    <template id="paginator-template"></template>

    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
