<!doctype html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./src/styles/fonts.css" />
  <link rel="stylesheet" href="./src/styles/variables.css" />
  <link rel="stylesheet" href="./src/styles/globals.css" />
  <link rel="stylesheet" href="./src/styles/header-style.css" />
  <link rel="stylesheet" href="./src/styles/style.css" />
  <title>Галактический вестник</title>
</head>
<html lang="ru">
  <body>
    <div id="header-container"></div>
    <main id="main">
      <div id="news-item-test-container"></div>
      <div id="news-list-test-container"></div>
      <div id="news-card-detailed-test-container"></div>
      <div id="news-card-banner-test-container"></div>
    </main>
    <footer id="footer"></footer>
    <template id="header-template">
      <header class="header_body">
        <div class="header_logo_container">
          <img class="header_logo" />
        </div>
      </header>
    </template>
    <template id="main-page"></template>
    <template id="news-details-page"></template>
    <template id="news-list-template">
      <h2 class="news_list_title">Новости</h2>
    </template>
    <template id="news-card-item-template">
      <div class="news-card">
        <span class="news-card-date"></span>

        <h3 class="news-card-title"></h3>

        <span class="news-card-announce"></span>

        <button class="news-card-details-button">Подробнее</button>
      </div>
    </template>
    <template id="news-card-banner"></template>
    <template id="news-card-detailed"></template>
    <template id="footer-template"></template>

    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
